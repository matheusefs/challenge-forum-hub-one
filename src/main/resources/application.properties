# ===========================
# ConfigurańŃo do Banco MySQL
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/forumhub?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=SEU_USUARIO
spring.datasource.password=SUA_SENHA
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# Flyway
# ===========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ===========================
# JWT
# ===========================
api.security.token.secret=${JWT_SECRET:minha_chave_secreta_forumhub}
api.security.token.expiration=86400000

logging.level.org.springframework.security=DEBUG